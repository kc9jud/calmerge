services:
  calmerge:
    build: .
    # No ports exposed — only reachable from nginx via the internal network
    volumes:
      - ./config.toml:/config/config.toml:ro
      # If any sources use local file paths, mount those directories here, e.g.:
      # - /home/user/calendars:/calendars:ro
    environment:
      CALMERGE_CONFIG: /config/config.toml
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/calmerge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - calmerge
    restart: unless-stopped
