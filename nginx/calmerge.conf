upstream calmerge {
    server calmerge:8080;
    keepalive 4;
}

server {
    listen 80;
    server_name _;

    # Calendar endpoints
    location ~ ^/[a-zA-Z][a-zA-Z0-9_-]*\.ics$ {
        proxy_pass         http://calmerge;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 65s;

        # Propagate Cache-Control from the app to the client unchanged
        proxy_pass_header  Cache-Control;

        add_header         Content-Disposition "attachment" always;
    }

    location = /health {
        proxy_pass         http://calmerge;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Block everything else
    location / {
        return 404;
    }
}
